<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000091" />
  <title>FR Tutor — Çevrimdışı</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #09090B;
      color: #E4E4E7;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(90deg, #ffffff, #e3b505);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p { color: #71717A; font-size: 0.875rem; line-height: 1.6; max-width: 320px; }
    .retry {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #000091, #4169E1);
      color: #fff;
      border: 1px solid rgba(65, 105, 225, 0.5);
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
    }
    .retry:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Çevrimdışısın</h1>
  <p>İnternet bağlantın yok. Son çalıştığın kartlarla devam edebilirsin — bağlantı geldiğinde veriler otomatik senkronize edilecek.</p>
  <button class="retry" onclick="location.reload()">Tekrar Dene</button>
</body>
</html>
